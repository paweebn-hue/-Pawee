<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เข้าสู่ระบบ</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial;

background-image:url("https://wallpapercave.com/wp/wp5128415.jpg");
background-size:cover;
background-position:center;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:95%;
padding:10px;
background:#2196F3;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0b7dda;
}

a{
display:block;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">
<h2>เข้าสู่ระบบ</h2>

<form>
<input type="text" placeholder="ชื่อผู้ใช้" required>
<input type="password" placeholder="รหัสผ่าน" required>

<button type="submit">เข้าสู่ระบบ</button>
</form>

<a href="register.html">สมัครสมาชิก</a>

</div>

</body>
</html>
